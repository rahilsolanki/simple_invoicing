name: Bug report
description: Report a reproducible bug
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line summary of the bug
      placeholder: Ledger statement shows incorrect closing balance
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps and data used
      placeholder: |
        1. Login as admin
        2. Create sales voucher with...
        3. Open ledger statement...
        4. Observe mismatch...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Docker/manual, backend/frontend versions
      placeholder: macOS 15, Chrome 132, Docker dev profile
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste logs, stack traces, or screenshots if available
      render: shell
